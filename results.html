<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Prediction</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Prediction Result</h1>
</header>

<nav>
<a href="index.html">Home</a>
<a href="test.html">Test</a>
<a href="research.html">Research</a>
<a href="team.html">Team</a>
</nav>

<main>

<h2>Your Risk Assessment</h2>

<div id="result"></div>

</main>

<footer>
<p>© 2026 Breast Cancer Risk Project</p>
</footer>

<script>

const params = new URLSearchParams(window.location.search);

const age = params.get("age");
const edge = params.get("tumour-edge");
const history = params.get("fam-hist");
const shape = params.get("shape");

let score = 0;

if(age === "A") score += 2;
if(age === "B") score += 1;

if(edge === "A") score += 2;

if(history === "C") score += 2;
if(history === "B") score += 1;

if(shape === "C") score += 2;

let risk;

if(score <= 2){
risk = "Low Risk";
}
else if(score <= 5){
risk = "Moderate Risk";
}
else{
risk = "High Risk";
}

document.getElementById("result").innerHTML =
"<h3>Predicted Risk: " + risk + "</h3>";

</script>

</body>
</html>
