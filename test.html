<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test | Breast Cancer Risk Prediction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Risk Test</h1>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="test.html">Test</a>
    <a href="research.html">Research</a>
    <a href="team.html">Team</a>
  </nav>

  <main>
    <section>
      <h2>Enter Patient Information</h2>
      <form>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required />

        <label for="tissue-composition">Tissue Composition:</label>
        <input type="number" id="tissue-composition" name="tissue-composition" required />

        <label for="visual-signs">Visual Signs:</label>
        <input type="number" id="visual-signs" name="visual-signs" required />

        <label for="fam-hist">Family History:</label>
        <input type="number" id="fam-hist" name="fam-hist" required />

        <label for="HRT-BC">Hormonal Replacement Therapy (HRT) or Birth Control:</label>
        <input type="number" id="HRT-BC" name="HRT-BC" required />
        
        <label for="shape">Shape:</label>
        <input type="number" id="shape" name="shape" required />

        <button type="submit">Predict Risk</button>
      </form>

      <p class="note">
        This tool is for educational/research purposes only and does not replace medical advice.
      </p>
    </section>
  </main>

  <footer>
    <p>© 2026 Breast Cancer Risk Project</p>
  </footer>
</body>
</html>
