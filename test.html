<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test | Breast Cancer Risk Prediction</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Verification Test</h1>
  </header>
  <script>
const dropZone = document.getElementById("drop-zone");
const fileInput = document.getElementById("image-upload");
const preview = document.getElementById("preview");

dropZone.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", function() {
  displayImage(this.files[0]);
});

dropZone.addEventListener("dragover", function(e) {
  e.preventDefault();
  dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", function() {
  dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", function(e) {
  e.preventDefault();
  dropZone.classList.remove("dragover");
  
  const file = e.dataTransfer.files[0];
  fileInput.files = e.dataTransfer.files;
  
  displayImage(file);
});

function displayImage(file) {
  preview.innerHTML = "";
  const img = document.createElement("img");
  img.src = URL.createObjectURL(file);
  img.style.maxWidth = "300px";
  img.style.marginTop = "10px";
  preview.appendChild(img);
}
</script>
  
  <nav>
    <a href="index.html">Home</a>
    <a href="test.html">Test</a>
    <a href="research.html">Research</a>
    <a href="team.html">Team</a>
  </nav>

  <main>
    <section>
      <label for="image-upload">Upload Mammogram Image:</label>

      <div id="drop-zone">
        <p>Drag & drop an image here or click to upload</p>
        <input type="file" id="image-upload" name="image-upload" accept="image/*">
      </div>

      <div id="preview"></div>
      <form>

        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required />

        <label for="tissue-composition">Tissue Composition:</label>
        <select id="tissue-composition" name="tissue-composition" required>
          <option value="">Select</option>
          <option value="A">A - heterogeneous: predominantly fat</option>
          <option value="B">B - heterogeneous: fibroglandular</option>
          <option value="C">C - heterogeneous: predominantly fibroglandular</option>
          <option value="D">D - homogeneous: fat</option>
          <option value="E">E - homogeneous: fibroglandular</option>
          <option value="F">F - lactating</option>
          <option value="G">G - lactating & homogeneous: fibroglandular</option>
        </select>
        

        <label for="visual-signs">Visual Signs:</label>
        <select id="visual-signs" name="visual-signs" required>
          <option value="">Select</option>
          <option value="A">A - breast scar</option>
          <option value="B">B - nipple retraction & palpable</option>
          <option value="C">C - palpable</option>
          <option value="D">D - breast scar & skin retraction</option>
          <option value="E">E - nipple retraction</option>
          <option value="F">F - peau d'orange & palpable</option>
          <option value="G">G - warmth & palpable</option>
          <option value="H">H - redness, warmth & palpable</option>
          <option value="I">I - redness & warmth</option>
          <option value="J">J - palpable & breast scar</option>
          <option value="K">K - skin retraction & palpable</option>
          <option value="L">L - none</option>
        </select>

        <label for="symp">Symptoms:</label>
        <select id="symp" name="symp" required>
          <option value="">Select</option>
          <option value="A">A - family history of breast cancer</option>
          <option value="B">B - nipple discharge</option>
          <option value="C">C - jormonal replacement therapy (HRT)</option>
          <option value="D">D - hormonal contraceptive</option>
          <option value="E">E - nipple discharge & family history of breast/ovarian cancer</option>
        </select>

        <label for="shape">Shape:</label>
        <select id="shape" name="shape" required>
          <option value="">Select</option>
          <option value="A">A - oval</option>
          <option value="B">B - round</option>
          <option value="C">C - irregular</option>
          <option value="D">D - not applicable</option>
        </select>

        <button type="submit">Predict Risk</button>
      </form>

      <p class="note">
        This tool is for educational/research purposes only and does not replace medical advice.
      </p>
    </section>
  </main>

  <footer>
    <p>© 2026 Breast Cancer Risk Project</p>
  </footer>
</body>
</html>
